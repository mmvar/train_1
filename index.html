<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Annotation Tool - Train 1</title>

  <style>
    body { font-family: Arial; text-align: center; }
    img { max-height: 400px; margin: 20px; }
    button { font-size: 20px; padding: 10px 20px; margin: 10px; }
    .selected { background-color: green; color: white; }
  </style>
</head>

<body>

<h2 id="counter"></h2>
<p id="filename"></p>

<img id="image" src="" />

<div>
  <button id="male">Male (←)</button>
  <button id="female">Female (→)</button>
</div>

<br>
<button onclick="download()">Download CSV</button>

<script>
const SELECTION = "1";

let data = [];
let index = 0;

// ============================================
// LOAD CSV
// ============================================
fetch(`selected_images_train_${SELECTION}.csv`)
  .then(r => {
    if (!r.ok) {
      throw new Error("CSV not found: " + r.status);
    }
    return r.text();
  })
  .then(text => {

    const rows = text.trim().split("\n").map(r => r.split(","));
    const headers = rows[0];

    data = rows.slice(1).map(r => {
      let obj = {};
      headers.forEach((h, i) => obj[h] = r[i] || "");
      return obj;
    });

    // ✅ Try restoring previous progress
    const saved = localStorage.getItem("annotations_train_1");
    if (saved) {
      data = JSON.parse(saved);
      console.log("✅ Restored previous session");
    }

    update();
  })
  .catch(err => {
    console.error("❌ Failed to load CSV:", err);
  });

// ============================================
// HELPERS
// ============================================
function getImageName(row) {
  if (!row || !row.filepath) {
    console.error("Missing filepath:", row);
    return "";
  }
  return row.filepath.split("/").pop();
}

// ============================================
// UPDATE UI
// ============================================
function update() {
  if (!data.length) return;

  const row = data[index];

  document.getElementById("counter").innerText =
    `${index + 1} / ${data.length}`;

  document.getElementById("filename").innerText =
    getImageName(row);

  document.getElementById("image").src =
    `output_images_train_${SELECTION}/` + getImageName(row);

  document.getElementById("male").classList.toggle(
    "selected", row.sex === "male"
  );
  document.getElementById("female").classList.toggle(
    "selected", row.sex === "female"
  );
}

// ============================================
// SELECT LABEL
// ============================================
function select(sex) {
  data[index].sex = sex;

  // ✅ Save progress automatically
  localStorage.setItem("annotations_train_1", JSON.stringify(data));

  index = Math.min(index + 1, data.length - 1);
  update();
}

// ============================================
// CONTROLS
// ============================================
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") select("male");
  if (e.key === "ArrowRight") select("female");

  // ✅ Go back
  if (e.key === "ArrowUp") {
    index = Math.max(0, index - 1);
    update();
  }
});

document.getElementById("male").onclick = () => select("male");
document.getElementById("female").onclick = () => select("female");

// ============================================
// DOWNLOAD
// ============================================
function download() {
  const headers = Object.keys(data[0]);
  const rows = data.map(r => headers.map(h => r[h]).join(","));
  const csv = [headers.join(","), ...rows].join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "annotated_train_1.csv";
  a.click();
}
</script>

</body>
</html>
